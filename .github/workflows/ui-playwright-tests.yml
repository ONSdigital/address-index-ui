name: Python and JS tests run against API demo

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Check out the AIMS UI repository
    - name: Checkout repository
      uses: actions/checkout@v6

    # Install Docker Compose for deploying the API
    - name: Install Docker Compose
      run: |
        sudo apt-get update
        sudo apt-get install -y docker-compose

    - name: Start the API via Docker Compose
      run: |
        docker-compose -f api_demo/docker-compose.yml up -d
        docker ps -a

    # Wait for API to be ready
    - name: Wait for API to be ready
      run: |
        timeout 340s bash -c 'until curl -s http://localhost:9001; do sleep 5; done'

    # Download and inflate Design System Components
    - name: Download and inflate Design System Components
      run: |
        scripts/load_templates.sh

    # Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements_test.txt

    - name: Install the UI as a python package
      run: |
        pip install -e .

    - name: Install Playwright Browsers
      run: |
        python3 -m playwright install --with-deps

    # Run flask server in testing environment
    - name: Run Flask Server
      env:
        FLASK_ENV: testing
      run: |
        python3 wsgi.py &

    # Run Python Playwright Tests
    - name: Run Python Playwright Tests
      run: |
        python3 -m pytest tests/pytest_tests -n 4 \
          --output=test-results \
          --screenshot=only-on-failure

    # Diagnostic step: confirm whether screenshots were actually generated
    - name: Show generated Playwright test artefacts
      if: ${{ !cancelled() }}
      run: |
        echo "Current working directory:"
        pwd
        echo "Files under test-results:"
        find test-results -maxdepth 5 -type f -print 2>/dev/null || echo "No test-results directory found"

    # Upload Playwright failure screenshots
    - name: Upload Python Playwright failure screenshots
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v6
      with:
        name: python-playwright-failure-screenshots
        path: test-results/
        if-no-files-found: ignore
        retention-days: 7

    # Set up Node.js environment
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '14'
        package-manager-cache: false

    - name: Install npm dependencies
      run: npm install

    - name: Run JavaScript tests
      run: npm run test:jest

    # Stop Docker Compose and clean up
    - name: Stop and clean up Docker containers
      if: always()
      run: |
        cd api_demo
        docker-compose down